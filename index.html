<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="The Dev Space Terminal — Portfolio WebXR de Brandon Degbe, développeur .NET & XR." />
    <title>The Dev Space Terminal</title>
    <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>

    <!-- ═══════════════════════════════════════════
         LOADER / SPLASH SCREEN
         Affiché pendant l'init A-Frame / WebXR.
         Retiré automatiquement via main.js
    ═══════════════════════════════════════════ -->
    <div id="loader">
      <div class="loader-inner">
        <p class="loader-title">THE DEV SPACE TERMINAL</p>
        <p class="loader-sub">Initialisation WebXR...</p>
        <div class="loader-bar-wrap">
          <div class="loader-bar" id="loader-bar"></div>
        </div>
        <p class="loader-hint" id="loader-hint">Chargement de la scène</p>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════
         SCÈNE A-FRAME
    ═══════════════════════════════════════════ -->
    <a-scene
      id="main-scene"
      background="color: #000000"
      renderer="antialias: true; colorManagement: true"
      vr-mode-ui="enabled: true"
      loading-screen="enabled: false"
    >

      <!-- Assets (lazy loaded) -->
      <a-assets timeout="10000">
        <img id="img-overvue"  src="/assets/images/overvue.webp"  crossorigin="anonymous" />
        <img id="img-bmanager" src="/assets/images/bmanager.webp" crossorigin="anonymous" />
      </a-assets>

      <!-- ── Caméra ── -->
      <a-entity id="rig" position="0 1.6 4">
        <a-camera
          look-controls="reverseMouseDrag: false; touchEnabled: true"
          wasd-controls="acceleration: 20"
          cursor="fuse: false; rayOrigin: mouse"
        >
          <!-- Curseur de visée (desktop) -->
          <a-entity
            cursor="fuse: false"
            position="0 0 -1"
            geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
            material="color: #00FFCC; shader: flat; opacity: 0.7"
          ></a-entity>
        </a-camera>
      </a-entity>

      <!-- ── Sol cyber ── -->
      <a-entity scene-floor></a-entity>

      <!-- ── Lumières ── -->
      <a-light type="ambient"      color="#112211" intensity="1.2"></a-light>
      <a-light type="point" color="#2E9E72" intensity="1.5" position="0 3 0" distance="15"></a-light>
      <a-light type="point" color="#00FFCC" intensity="0.4" position="-8 2 0" distance="10"></a-light>
      <a-light type="point" color="#00FFCC" intensity="0.4" position="8 2 0"  distance="10"></a-light>

      <!-- ── Hub Central (0, 0, 0) ── -->
      <a-entity id="hub" hub-panel position="0 0 0"></a-entity>

      <!-- ── Projects Bay (aile gauche) ── -->
      <a-entity id="projects-bay" position="-8 0 0">
        <!-- Titre de zone -->
        <a-text
          value="PROJECTS BAY"
          color="#2E9E72"
          font="monoid"
          align="center"
          position="0 3.2 0"
          scale="1.2 1.2 1.2"
        ></a-text>
        <!-- Overvue -->
        <a-entity
          project-card="
            title: Overvue;
            description: Gestion de projets Blazor Server.\nDéployé sur Render.;
            image: #img-overvue;
            url: https://overvue.onrender.com"
          position="0 1.2 0"
        ></a-entity>
        <!-- BManager -->
        <a-entity
          project-card="
            title: BManager;
            description: Dashboard Blazor + MudBlazor\navec graphiques interactifs.;
            image: #img-bmanager;
            url: https://bmanager.onrender.com"
          position="0 -0.8 0"
        ></a-entity>
      </a-entity>

      <!-- ── Skills Core (aile droite) ── -->
      <a-entity id="skills-core" position="8 0 0">
        <!-- Titre de zone -->
        <a-text
          value="SKILLS CORE"
          color="#2E9E72"
          font="monoid"
          align="center"
          position="0 3.2 0"
          scale="1.2 1.2 1.2"
        ></a-text>
        <!-- Orbs compétences -->
        <a-entity skill-orb="label: C#;          color: #2E9E72" position="-1.5  1.5  0"></a-entity>
        <a-entity skill-orb="label: Blazor;      color: #2E9E72" position=" 1.5  1.5  0"></a-entity>
        <a-entity skill-orb="label: A-Frame/WebXR; color: #00FFCC" position=" 0    1.5 -1.5"></a-entity>
        <a-entity skill-orb="label: MudBlazor;   color: #2E9E72" position="-1.5  0    0"></a-entity>
        <a-entity skill-orb="label: RFID/POS;    color: #2E9E72" position=" 1.5  0    0"></a-entity>
        <a-entity skill-orb="label: Flutter;     color: #1A6B4A" position=" 0    0   -1.5"></a-entity>
      </a-entity>

      <!-- ── Skybox (étoilée) ── -->
      <a-sky color="#020a05"></a-sky>

    </a-scene>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
